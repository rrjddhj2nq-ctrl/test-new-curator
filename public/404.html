<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Test Curator</title>
    <script>
      var redirect = sessionStorage.getItem("gh-pages-redirect");
      sessionStorage.removeItem("gh-pages-redirect");
      if (redirect) history.replaceState(null, "", redirect);
    </script>
    <script>
      sessionStorage.setItem(
        "gh-pages-redirect",
        location.pathname + location.search + location.hash
      );
      location.replace(
        location.origin + "/test-curator/" + location.search + location.hash
      );
    </script>
  </head>
  <body></body>
</html>
